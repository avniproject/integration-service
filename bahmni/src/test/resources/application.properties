spring.config.import=classpath:/bahmni-application.properties,classpath:/avni-application.properties,classpath:/util-application.properties,classpath:/int-data.application.properties
# Logging
logging.level.org.springframework.web.client.RestTemplate=DEBUG

spring.datasource.url=jdbc:postgresql://localhost:5432/avni_int_test

#HealthCheck IDS
bahmni.healthcheck.slug=${BAHMNI_HEALTHCHECK_SLUG:}

# Bahmni Connection Properties for JSS
bahmni.openmrs.url=https://jss-bahmni-prerelease.avniproject.org/openmrs
bahmni.openmrs.username=<username>
bahmni.openmrs.password=<password>
bahmni.openmrs.rest.session.timeout=300000
